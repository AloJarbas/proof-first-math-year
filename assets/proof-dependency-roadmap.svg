<rect width="1600" height="1060" fill="url(#bg)"/>
<text x="60.0" y="64.0" class="title" text-anchor="start">Proof-first dependency roadmap</text>
<text x="60.0" y="96.0" class="subtitle" text-anchor="start"><tspan x="60.0" dy="0">A study map for deciding what unlocks what, and when a new stream should stay light</tspan><tspan x="60.0" dy="22">instead of taking over.</tspan></text>
<rect x="90.0" y="180.0" width="350.0" height="250.0" rx="20" fill="#1b2c3d" stroke="#5e7fa3" stroke-width="2"/>
<text x="112.0" y="216.0" class="label" text-anchor="start"><tspan x="112.0" dy="0">1. Proof foundations</tspan></text>
<text x="112.0" y="248.0" class="small" text-anchor="start"><tspan x="112.0" dy="0">The non-negotiable bottleneck.</tspan></text>
<text x="114.0" y="286.0" class="small" text-anchor="start">• logic, sets, functions</text>
<text x="114.0" y="310.0" class="small" text-anchor="start">• direct proof, contradiction, contrapositive</text>
<text x="114.0" y="334.0" class="small" text-anchor="start">• induction, definitions, clean notation</text>
<text x="114.0" y="358.0" class="small" text-anchor="start">• proof journal + error tags + weekly review</text>
<rect x="500.0" y="180.0" width="350.0" height="250.0" rx="20" fill="#183544" stroke="#5e7fa3" stroke-width="2"/>
<text x="522.0" y="216.0" class="label" text-anchor="start"><tspan x="522.0" dy="0">2. Calculus spine</tspan></text>
<text x="522.0" y="248.0" class="small" text-anchor="start"><tspan x="522.0" dy="0">Bring back computation without</tspan><tspan x="522.0" dy="20">dropping proof work.</tspan></text>
<text x="524.0" y="306.0" class="small" text-anchor="start">• keep proof sessions alive</text>
<text x="524.0" y="330.0" class="small" text-anchor="start">• use problem volume for fluency</text>
<text x="524.0" y="354.0" class="small" text-anchor="start">• do not let procedure replace writing</text>
<text x="524.0" y="378.0" class="small" text-anchor="start">• good secondary stream once proofs are holding</text>
<rect x="910.0" y="180.0" width="350.0" height="250.0" rx="20" fill="#19354a" stroke="#5e7fa3" stroke-width="2"/>
<text x="932.0" y="216.0" class="label" text-anchor="start"><tspan x="932.0" dy="0">3. Discrete reinforcement</tspan></text>
<text x="932.0" y="248.0" class="small" text-anchor="start"><tspan x="932.0" dy="0">Formal structure that pays back</tspan><tspan x="932.0" dy="20">into proof style.</tspan></text>
<text x="934.0" y="306.0" class="small" text-anchor="start">• relations, counting, recurrence, induction</text>
<text x="934.0" y="330.0" class="small" text-anchor="start">• definition handling gets sharper</text>
<text x="934.0" y="354.0" class="small" text-anchor="start">• best added after proof habit is real</text>
<text x="934.0" y="378.0" class="small" text-anchor="start">• keep it lighter than the main spine</text>
<rect x="90.0" y="500.0" width="350.0" height="250.0" rx="20" fill="#3a2f27" stroke="#5e7fa3" stroke-width="2"/>
<text x="112.0" y="536.0" class="label" text-anchor="start"><tspan x="112.0" dy="0">Operating rule</tspan></text>
<text x="112.0" y="568.0" class="small" text-anchor="start"><tspan x="112.0" dy="0">Do not run four equal-intensity</tspan><tspan x="112.0" dy="20">courses at once.</tspan></text>
<text x="114.0" y="626.0" class="small" text-anchor="start">• proof stays primary until it stops fragmenting</text>
<text x="114.0" y="650.0" class="small" text-anchor="start">• new streams begin as controlled additions</text>
<text x="114.0" y="674.0" class="small" text-anchor="start">• review and rewrite count as real study</text>
<text x="114.0" y="698.0" class="small" text-anchor="start">• narrowing the load is design, not failure</text>
<rect x="500.0" y="500.0" width="350.0" height="250.0" rx="20" fill="#25314b" stroke="#5e7fa3" stroke-width="2"/>
<text x="522.0" y="536.0" class="label" text-anchor="start"><tspan x="522.0" dy="0">4. Linear algebra</tspan></text>
<text x="522.0" y="568.0" class="small" text-anchor="start"><tspan x="522.0" dy="0">Preview early, then study honestly</tspan><tspan x="522.0" dy="20">once the language is stable.</tspan></text>
<text x="524.0" y="626.0" class="small" text-anchor="start">• start with systems, geometry, eigenideas</text>
<text x="524.0" y="650.0" class="small" text-anchor="start">• then move toward vector spaces and maps</text>
<text x="524.0" y="674.0" class="small" text-anchor="start">• works better after proof language settles</text>
<text x="524.0" y="698.0" class="small" text-anchor="start">• use a preview before a full heavy block</text>
<rect x="910.0" y="500.0" width="350.0" height="250.0" rx="20" fill="#2a3050" stroke="#5e7fa3" stroke-width="2"/>
<text x="932.0" y="536.0" class="label" text-anchor="start"><tspan x="932.0" dy="0">5. Real analysis</tspan></text>
<text x="932.0" y="568.0" class="small" text-anchor="start"><tspan x="932.0" dy="0">The maturity core waiting on</tspan><tspan x="932.0" dy="20">prepared ground.</tspan></text>
<text x="934.0" y="626.0" class="small" text-anchor="start">• limits, continuity, approximation, convergence</text>
<text x="934.0" y="650.0" class="small" text-anchor="start">• forces clean hypothesis control</text>
<text x="934.0" y="674.0" class="small" text-anchor="start">• best after proof + algebra + calculus fluency</text>
<text x="934.0" y="698.0" class="small" text-anchor="start">• where mathematical precision starts to feel adult</text>
<rect x="1300.0" y="500.0" width="220.0" height="250.0" rx="20" fill="#2b2b4e" stroke="#5e7fa3" stroke-width="2"/>
<text x="1322.0" y="536.0" class="label" text-anchor="start"><tspan x="1322.0" dy="0">6. Probability</tspan></text>
<text x="1322.0" y="568.0" class="small" text-anchor="start"><tspan x="1322.0" dy="0">Stronger when it lands on a</tspan><tspan x="1322.0" dy="20">mature base.</tspan></text>
<text x="1324.0" y="626.0" class="small" text-anchor="start">• conditioning</text>
<text x="1324.0" y="650.0" class="small" text-anchor="start">• random variables</text>
<text x="1324.0" y="674.0" class="small" text-anchor="start">• expectation + variance</text>
<text x="1324.0" y="698.0" class="small" text-anchor="start">• model before calculation</text>
<rect x="500.0" y="840.0" width="620.0" height="140.0" rx="20" fill="#1f3b3d" stroke="#5e7fa3" stroke-width="2"/>
<text x="522.0" y="876.0" class="label" text-anchor="start"><tspan x="522.0" dy="0">7. Consolidation and integration</tspan></text>
<text x="522.0" y="908.0" class="small" text-anchor="start"><tspan x="522.0" dy="0">Rewrite weak proofs, revisit hard topics without notes,</tspan><tspan x="522.0" dy="20">and tie the year back to scientific work.</tspan></text>
